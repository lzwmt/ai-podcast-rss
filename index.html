<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>代码与财富 — AI × 投资 播客</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 48px; }
    h1 { font-size: 2em; margin-bottom: 8px; background: linear-gradient(135deg, #00d4ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { color: #888; font-size: 1.1em; }
    .subscribe { margin: 24px 0; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .subscribe a { display: inline-block; padding: 10px 20px; border: 1px solid #333; border-radius: 8px; color: #ccc; text-decoration: none; transition: all 0.2s; }

    .episode h2 { font-size: 1.2em; margin-bottom: 8px; color: #fff; }
    .episode .meta { color: #666; font-size: 0.9em; margin-bottom: 12px; }
    .episode .desc { color: #aaa; margin-bottom: 16px; }
    .episode audio { width: 100%; }
    .rss-link { text-align: center; margin-top: 40px; }
    .rss-link a { color: #ff9500; text-decoration: none; }
    .rss-link a:hover { text-decoration: underline; }

</head>
